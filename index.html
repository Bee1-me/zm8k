<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee1</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  background: linear-gradient(90deg, gray, white, black);
  background-size: 200%;
  animation: shine 5s linear infinite;
  color: white;
  text-align: center;
  font-family: 'Comic Neue', cursive;
  margin: 0;
}

h1 {
  text-shadow: 0 0 10px white;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 25px white; }
}

.links {
  margin: 40px auto;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

a {
  width: 180px;
  padding: 15px;
  background: gray;
  color: white;
  border: 2px solid red;
  border-radius: 10px;
  text-decoration: none;
  transition: 0.3s;
}

a:hover {
  transform: scale(1.1);
}

.about-box {
  width: 90%;
  max-width: 700px;
  margin: 50px auto;
  padding: 25px;
  background: rgba(0,0,0,0.7);
  border: 2px solid red;
  border-radius: 15px;
}

/* 🎵 MUSIC UI */
.music-player-ui {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  border: 2px solid red;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 0 15px red;
}

.music-player-ui button {
  background: red;
  border: none;
  color: white;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  cursor: pointer;
}

.music-player-ui input {
  width: 100%;
}
</style>
</head>

<body>

<h1>Welcome To This Website</h1>
<h1>Social Links</h1>

<div class="links">
  <a href="https://www.twitch.tv/k4r0_r6" target="_blank">
    <i class="fa-brands fa-twitch"></i> Twitch
  </a>

  <a href="https://www.youtube.com/@karo-r6" target="_blank">
    <i class="fa-brands fa-youtube"></i> YouTube
  </a>
</div>

<h4>Discord Username: <span style="color: lightgray;">karor6</span></h4>

<div class="about-box">
  <h2>About Me</h2>
  <p>Hello! I'm Bee1 — a creator who enjoys gaming, streaming, and web design.</p>
</div>

<h5>Developed By: Bee1</h5>

<!-- 🎵 REAL AUDIO PLAYER -->
<audio id="audio" loop>
  <source src="night-we-met.mp3" type="audio/mpeg">
</audio>

<div class="music-player-ui">
  <button onclick="playMusic()">▶️</button>
  <button onclick="pauseMusic()">⏸️</button>
  <button onclick="toggleMute()">🔊</button>
  <br>
  <input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
</div>

<script>
const audio = document.getElementById("audio");

function playMusic() {
  audio.play();
}

function pauseMusic() {
  audio.pause();
}

function toggleMute() {
  audio.muted = !audio.muted;
}

function setVolume(val) {
  audio.volume = val;
}

/* Optional: start muted autoplay */
window.addEventListener("click", () => {
  audio.play();
}, { once: true });
</script>

</body>
</html>
