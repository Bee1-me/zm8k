<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bee1</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(90deg, gray, white, black);
      background-size: 200%;
      animation: shine 5s linear infinite;
      color: white;
      text-align: center;
      font-family: 'Comic Neue', cursive;
      margin: 0;
    }

    h1 {
      text-shadow: 0 0 10px white;
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px red, 0 0 20px white; }
      to { text-shadow: 0 0 25px lightgray, 0 0 35px whitesmoke; }
    }

    .links {
      margin: 40px auto;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }

    a {
      display: inline-block;
      width: 180px;
      padding: 15px;
      background: gray;
      color: whitesmoke;
      border: 2px solid red;
      border-radius: 10px;
      box-shadow: 0 0 10px red;
      text-decoration: none;
      transition: 0.3s;
      font-size: 18px;
    }

    a:hover {
      transform: scale(1.1);
      color: gray;
      background: linear-gradient(100deg, black, gray, black);
      box-shadow: 0 0 20px white;
    }

    .glow-btn {
      background: linear-gradient(90deg, blue, red, purple);
      background-size: 200%;
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% { background-position: 200% center; }
      100% { background-position: 0 center; }
    }

    .about-box {
      width: 90%;
      max-width: 700px;
      margin: 50px auto;
      padding: 25px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid red;
      border-radius: 15px;
      box-shadow: 0 0 15px red;
    }

    h5 { color: red; }

    .music-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: black;
      border: 2px solid red;
      color: white;
      padding: 12px 18px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 10px red;
    }

    iframe { display: none; }
  </style>
</head>

<body>

  <!-- ✅ CORRECT SONG -->
  <iframe id="musicPlayer"
    src="https://www.youtube.com/embed/ztl6uLxO7fE?autoplay=1&mute=1&loop=1&playlist=ztl6uLxO7fE"
    allow="autoplay">
  </iframe>

  <h1>Welcome To This Website</h1>
  <h1>Social Links</h1>

  <div class="links">
    <a class="glow-btn" href="https://www.twitch.tv/k4r0_r6" target="_blank">
      <i class="fa-brands fa-twitch"></i> Twitch
    </a>

    <a class="glow-btn" href="https://www.youtube.com/@karo-r6" target="_blank">
      <i class="fa-brands fa-youtube"></i> YouTube
    </a>
  </div>

  <h4>Discord Username: <span style="color: lightgray;">karor6</span></h4>

  <div class="about-box">
    <h2>About Me</h2>
    <p>Hello! I'm <strong>Bee1</strong> — a creator who enjoys gaming, streaming, and web design.</p>
  </div>

  <h5>Developed By: Bee1</h5>

  <!-- BUTTON -->
  <button class="music-btn" onclick="toggleMusic()">🔇 Unmute</button>

  <script>
    let isMuted = true;
    const iframe = document.getElementById("musicPlayer");

    function toggleMusic() {
      if (isMuted) {
        iframe.src = "https://www.youtube.com/embed/ztl6uLxO7fE?autoplay=1&mute=0&loop=1&playlist=ztl6uLxO7fE";
        document.querySelector(".music-btn").innerText = "🔊 Mute";
      } else {
        iframe.src = "https://www.youtube.com/embed/ztl6uLxO7fE?autoplay=1&mute=1&loop=1&playlist=ztl6uLxO7fE";
        document.querySelector(".music-btn").innerText = "🔇 Unmute";
      }
      isMuted = !isMuted;
    }
  </script>

</body>
</html>
