<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee1</title>

<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  background: linear-gradient(90deg, gray, white, black);
  background-size: 200%;
  animation: shine 5s linear infinite;
  color: white;
  text-align: center;
  font-family: 'Comic Neue', cursive;
  margin: 0;
}

h1 {
  text-shadow: 0 0 10px white;
  animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red, 0 0 20px white; }
  to { text-shadow: 0 0 25px lightgray, 0 0 35px whitesmoke; }
}

.links {
  margin: 40px auto;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

a {
  display: inline-block;
  width: 180px;
  padding: 15px;
  background: gray;
  color: whitesmoke;
  border: 2px solid red;
  border-radius: 10px;
  box-shadow: 0 0 10px red;
  text-decoration: none;
  transition: 0.3s;
  font-size: 18px;
}

a:hover {
  transform: scale(1.1);
  color: gray;
  background: linear-gradient(100deg, black, gray, black);
  box-shadow: 0 0 20px white;
}

.glow-btn {
  background: linear-gradient(90deg, blue, red, purple);
  background-size: 200%;
  animation: shine 5s linear infinite;
}

@keyframes shine {
  0% { background-position: 200% center; }
  100% { background-position: 0 center; }
}

.about-box {
  width: 90%;
  max-width: 700px;
  margin: 50px auto;
  padding: 25px;
  background: rgba(0, 0, 0, 0.7);
  border: 2px solid red;
  border-radius: 15px;
  box-shadow: 0 0 15px red;
}

h5 { color: red; }

/* 🎵 Music Button */
.music-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: black;
  border: 2px solid red;
  color: white;
  padding: 12px 18px;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 0 10px red;
}

.music-btn:hover {
  background: red;
  color: black;
}
</style>
</head>

<body>

<h1>Welcome To This Website</h1>
<h1>Social Links</h1>

<div class="links">
  <a class="glow-btn" href="https://www.twitch.tv/k4r0_r6" target="_blank">
    <i class="fa-brands fa-twitch"></i> Twitch
  </a>

  <a class="glow-btn" href="https://www.youtube.com/@karo-r6" target="_blank">
    <i class="fa-brands fa-youtube"></i> YouTube
  </a>
</div>

<h4>Discord Username: <span style="color: lightgray;">karor6</span></h4>

<div class="about-box">
  <h2>About Me</h2>
  <p>Hello! I'm Bee1 — a creator who enjoys gaming, streaming, and web design.</p>
</div>

<h5>Developed By: Bee1</h5>

<!-- ✅ REAL AUDIO -->
<audio id="audio" loop>
  <source src="night-we-met.mp3" type="audio/mpeg">
</audio>

<button class="music-btn" onclick="toggleMusic()">▶️ Play Music</button>

<script>
const audio = document.getElementById("audio");
let playing = false;

function toggleMusic() {
  if (!playing) {
    audio.play();
    document.querySelector(".music-btn").innerText = "⏸ Pause";
  } else {
    audio.pause();
    document.querySelector(".music-btn").innerText = "▶️ Play Music";
  }
  playing = !playing;
}
</script>

</body>
</html>
